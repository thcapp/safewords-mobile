name: safewords-mobile
type: code
path: /data/code/safewords-mobile
description: "Native mobile apps for rotating TOTP-based family safewords (iOS Swift + Android Kotlin)"
tags: [mobile, swift, kotlin, swiftui, compose, totp, offline-first]
realm: "thc"

claude:
  auto_start: true
  flags: "--continue --dangerously-skip-permissions"

tmux:
  session_name: safewords-mobile

hooks:
  pre_session: []
  post_session: []

created: 2026-03-10

code:
  repos:
    ios:
      path: "repos/safewords-ios"
      language: "swift"
      framework: "swiftui"
      build: "xcodebuild -scheme Safewords build"
      test: "xcodebuild -scheme Safewords test"
    android:
      path: "repos/safewords-android"
      language: "kotlin"
      framework: "compose"
      build: "./gradlew assembleDebug"
      test: "./gradlew test"
  shared: "shared/"
  deploy:
    target: "app-stores"
  status: "development"
