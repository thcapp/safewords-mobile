<?xml version="1.0" encoding="UTF-8"?>
<!--
  Safewords brand mark — LIGHT-CANVAS variant.
  Recolor of safewords-icon-foreground.svg for warm off-white backgrounds
  (e.g. safewords.io editorial/marketing pages, palette: bg #FAF8F4, accent #8B1A1A).
  For the dark Ink palette (#0B0B0C bg, #E8553A accent) used by the mobile apps
  and safewords.io/app, use safewords-icon-foreground.svg instead.

  Canvas: 432x432 (matches the dark variant 1:1 for drop-in compatibility).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     width="432" height="432"
     viewBox="0 0 432 432">

  <g transform="translate(216, 216)">
    <!-- Shield body: ink-on-cream, inverted from the dark variant. -->
    <path d="
        M 0 -120
        L 100 -90
        L 100 30
        Q 100 110 0 132
        Q -100 110 -100 30
        L -100 -90
        Z"
      fill="#1A1A1A"
      stroke="none"/>

    <!-- Three figures: cream silhouette, negative space inside the dark shield. -->
    <g fill="#FAF8F4">
      <circle cx="0" cy="-12" r="22"/>
      <path d="M -36 60 Q -36 18 0 18 Q 36 18 36 60 L 36 90 L -36 90 Z"/>

      <circle cx="-44" cy="2" r="16"/>
      <path d="M -76 60 Q -76 28 -44 28 Q -36 28 -32 30 L -32 84 L -76 84 Z"/>

      <circle cx="44" cy="2" r="16"/>
      <path d="M 32 30 Q 36 28 44 28 Q 76 28 76 60 L 76 84 L 32 84 Z"/>
    </g>

    <!-- Verification dot: deep crimson, matches the web accent. -->
    <circle cx="58" cy="-66" r="22" fill="#8B1A1A"/>
    <!-- Cream tick inside the crimson dot. -->
    <path d="M 47 -66 L 55 -58 L 70 -74"
      stroke="#FAF8F4"
      stroke-width="6"
      stroke-linecap="round"
      stroke-linejoin="round"
      fill="none"/>
  </g>
</svg>
