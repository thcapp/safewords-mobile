name: Android Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Android unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: repos/safewords-android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('repos/safewords-android/**/*.gradle*', 'repos/safewords-android/**/gradle-wrapper.properties') }}

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Upload unit test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-unit-test-report
          path: repos/safewords-android/app/build/reports/tests/testDebugUnitTest

  maestro:
    name: Android Maestro flows
    runs-on: ubuntu-latest
    # The reactivecircus/android-emulator-runner@v2 action handles AVD boot.
    # Cold boot of an x86_64 system-image AVD on GH runners is ~90s; total
    # job time is dominated by AVD boot + first flow's emulator-warm-up.
    timeout-minutes: 45
    needs: unit
    defaults:
      run:
        working-directory: repos/safewords-android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('repos/safewords-android/**/*.gradle*', 'repos/safewords-android/**/gradle-wrapper.properties') }}

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Install Maestro CLI
        working-directory: .
        env:
          MAESTRO_CLI_NO_ANALYTICS: "1"
          MAESTRO_CLI_ANALYSIS_NOTIFICATION_DISABLED: "true"
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          echo "MAESTRO_CLI_NO_ANALYTICS=1" >> "$GITHUB_ENV"
          echo "MAESTRO_CLI_ANALYSIS_NOTIFICATION_DISABLED=true" >> "$GITHUB_ENV"

      - name: Enable KVM
        working-directory: .
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro flows on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: |
            set -e
            export PATH="$HOME/.maestro/bin:$PATH"
            export MAESTRO_CLI_NO_ANALYTICS=1
            export MAESTRO_CLI_ANALYSIS_NOTIFICATION_DISABLED=true
            adb wait-for-device
            adb shell input keyevent KEYCODE_WAKEUP || true
            adb install -r repos/safewords-android/app/build/outputs/apk/debug/app-debug.apk
            cd maestro/flows
            maestro test onboarding-create.yaml
            maestro test onboarding-restore.yaml
            maestro test onboarding-demo.yaml
            maestro test parity-check.yaml

      - name: Upload Maestro debug output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug
          path: ~/.maestro/tests
