name: iOS Release

on:
  workflow_dispatch:
    inputs:
      lane:
        description: "fastlane iOS lane to run"
        required: true
        default: "validate"
        type: choice
        options:
          - validate
          - match_setup
          - beta
          - metadata
          - release
          - screenshots_matrix
  push:
    branches:
      - "release/ios-*"
    tags:
      - "ios-v*"

permissions:
  contents: read

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ios:
    name: Build and upload iOS
    runs-on: macos-latest
    timeout-minutes: 90

    defaults:
      run:
        working-directory: repos/safewords-ios

    env:
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      MATCH_GIT_PRIVATE_KEY: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}
      FASTLANE_SKIP_UPDATE_CHECK: "true"
      FASTLANE_HIDE_CHANGELOG: "true"
      CI: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        working-directory: .
        run: |
          missing=0
          for name in APP_STORE_CONNECT_API_KEY_ID APP_STORE_CONNECT_API_ISSUER_ID APP_STORE_CONNECT_API_KEY_BASE64 APPLE_TEAM_ID MATCH_PASSWORD MATCH_GIT_URL; do
            if [[ -z "${!name}" ]]; then
              echo "::error title=Missing secret::$name is required"
              missing=1
            fi
          done

          if [[ -z "${MATCH_GIT_BASIC_AUTHORIZATION}" && -z "${MATCH_GIT_PRIVATE_KEY}" ]]; then
            echo "::error title=Missing match repo auth::Set MATCH_GIT_BASIC_AUTHORIZATION for HTTPS or MATCH_GIT_PRIVATE_KEY for SSH"
            missing=1
          fi

          exit "$missing"

      - name: Select Xcode
        shell: bash
        working-directory: .
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        shell: bash
        working-directory: .
        run: brew install xcodegen

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
          working-directory: repos/safewords-ios

      - name: Configure match SSH key
        if: ${{ env.MATCH_GIT_PRIVATE_KEY != '' }}
        shell: bash
        working-directory: .
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$MATCH_GIT_PRIVATE_KEY" > ~/.ssh/safewords_match
          chmod 600 ~/.ssh/safewords_match
          match_host="$(python3 - <<'PY'
          import os
          from urllib.parse import urlparse

          url = os.environ.get("MATCH_GIT_URL", "")
          if "://" in url:
              print(urlparse(url).hostname or "")
          elif "@" in url and ":" in url:
              print(url.split("@", 1)[1].split(":", 1)[0])
          else:
              print("")
          PY
          )"
          if [[ -n "$match_host" ]]; then
            ssh-keyscan "$match_host" >> ~/.ssh/known_hosts
          fi
          cat > ~/.ssh/config <<'EOF'
          Host *
            IdentityFile ~/.ssh/safewords_match
            StrictHostKeyChecking yes
          EOF

      - name: Materialize App Store Connect key
        shell: bash
        working-directory: .
        run: |
          mkdir -p "$RUNNER_TEMP/safewords-secrets"
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          key_path = Path(os.environ["RUNNER_TEMP"]) / "safewords-secrets" / "AuthKey.p8"
          key_path.write_bytes(base64.b64decode(os.environ["APP_STORE_CONNECT_API_KEY_BASE64"]))
          PY
          chmod 600 "$RUNNER_TEMP/safewords-secrets/AuthKey.p8"
          echo "APP_STORE_CONNECT_API_KEY_PATH=$RUNNER_TEMP/safewords-secrets/AuthKey.p8" >> "$GITHUB_ENV"
          echo "APP_STORE_CONNECT_API_KEY_BASE64=" >> "$GITHUB_ENV"

      - name: Generate Xcode project
        shell: bash
        run: xcodegen generate

      - name: Install Maestro CLI
        shell: bash
        working-directory: .
        env:
          MAESTRO_CLI_NO_ANALYTICS: "1"
          MAESTRO_CLI_ANALYSIS_NOTIFICATION_DISABLED: "true"
        run: |
          # brew install maestro is the supported macOS path. We also re-export
          # ~/.maestro/bin onto PATH for downstream steps in case Maestro pulls
          # a fallback installer location.
          brew install maestro
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
          echo "/opt/homebrew/bin" >> "$GITHUB_PATH"
          echo "MAESTRO_CLI_NO_ANALYTICS=1" >> "$GITHUB_ENV"
          echo "MAESTRO_CLI_ANALYSIS_NOTIFICATION_DISABLED=true" >> "$GITHUB_ENV"
          maestro --version

      - name: Boot iOS simulator (pre-warm for Maestro)
        shell: bash
        working-directory: .
        run: |
          # Pick the first available iPhone 15 simulator and boot it. The
          # fastlane :maestro_test lane re-boots if needed but pre-warming
          # cuts ~30s off the first flow run when the device is cold.
          udid=$(xcrun simctl list devices available --json \
            | python3 -c "import json,sys; data=json.load(sys.stdin); \
print(next((d['udid'] for runtime,devs in data['devices'].items() \
for d in devs if d['name']=='iPhone 15'), ''))")
          if [[ -z "$udid" ]]; then
            echo "::warning ::No 'iPhone 15' simulator found; lane will surface the error"
            exit 0
          fi
          echo "Booting $udid"
          xcrun simctl boot "$udid" || true
          xcrun simctl bootstatus "$udid" -b || true

      - name: Run fastlane
        shell: bash
        run: |
          requested_lane="${{ github.event.inputs.lane || '' }}"
          if [[ -n "$requested_lane" ]]; then
            lane="$requested_lane"
          elif [[ "$GITHUB_REF" == refs/tags/ios-v* ]]; then
            lane="release"
          else
            lane="beta"
          fi

          bundle exec fastlane ios "$lane"
