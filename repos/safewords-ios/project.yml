name: Safewords
options:
  bundleIdPrefix: com.thc
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    MARKETING_VERSION: "1.3.0"
    CURRENT_PROJECT_VERSION: "5"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: "YES"

targets:

  # Main App Target
  Safewords:
    type: application
    platform: iOS
    sources:
      - path: Safewords
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Safewords/Data/adjectives.json
      - path: Safewords/Data/nouns.json
      - path: ../../shared/wordlists/bip39-english.txt
      - path: ../../shared/safety-card-copy.json
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.thc.safewords
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: Safewords/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: Safewords/Safewords.entitlements
    entitlements:
      path: Safewords/Safewords.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.thc.safewords
        keychain-access-groups:
          - "$(AppIdentifierPrefix)group.app.thc.safewords"
    dependencies:
      - target: SafewordsWidget
        embed: true

  # Widget Extension Target
  SafewordsWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: SafewordsWidget
        excludes:
          - "**/.DS_Store"
    resources:
      - path: Safewords/Data/adjectives.json
      - path: Safewords/Data/nouns.json
      - path: ../../shared/wordlists/bip39-english.txt
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.thc.safewords.widget
        INFOPLIST_FILE: SafewordsWidget/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: SafewordsWidget/SafewordsWidget.entitlements
    entitlements:
      path: SafewordsWidget/SafewordsWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.app.thc.safewords
        keychain-access-groups:
          - "$(AppIdentifierPrefix)group.app.thc.safewords"

  # Test Target
  SafewordsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SafewordsTests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.thc.safewords.tests
    resources:
      - path: ../../shared/recovery-vectors.json
      - path: ../../shared/primitive-vectors.json
      - path: ../../shared/migration-vectors.json
      - path: ../../shared/safety-card-copy.json
      - path: ../../shared/wordlists/bip39-english.txt
    dependencies:
      - target: Safewords

  # UI Test Target for future fastlane snapshot runs
  SafewordsUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SafewordsUITests
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.thc.safewords.uitests
        TEST_TARGET_NAME: Safewords
    dependencies:
      - target: Safewords

schemes:
  Safewords:
    build:
      targets:
        Safewords: all
        SafewordsWidget: all
        SafewordsTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SafewordsTests
        - SafewordsUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
